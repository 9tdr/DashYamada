<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DashYamada</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { 
      background-color: #121317; 
      color: #9aa0a6; 
      font-family: 'Noto Sans Thai', sans-serif; 
      user-select: none;
      padding-bottom: 30px;
    }
    
    .container-app { max-width: 600px; margin: auto; padding: 15px; }
    
    .header-box {
      background-color: #1a1b21;
      border: 1px solid #3a3b40;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .status-badge {
      background-color: #3c4043;
      color: #e8eaed;
      font-size: 0.75rem;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 600;
      margin-left: 8px;
    }

    /* ช่องค้นหา */
    .search-box {
      background-color: #1a1b21;
      border: 1px solid #3a3b40;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .form-control-dark, .form-select-dark {
      background-color: #121317;
      border: 1px solid #3a3b40;
      color: #e8eaed;
    }
    .form-control-dark:focus, .form-select-dark:focus {
      background-color: #121317;
      color: #e8eaed;
      border-color: #f9ab00;
      box-shadow: none;
    }
    /* เปลี่ยนสีไอคอนปฏิทินให้มองเห็นใน Dark Mode */
    ::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.7; }
    
    .card-dark {
      background-color: #1a1b21;
      border: 1px solid #2a2b30;
      border-radius: 12px;
      padding: 15px;
      height: 100%;
    }
    .card-title-sm { font-size: 0.85rem; color: #9aa0a6; margin-bottom: 8px; }
    .unit-text { font-size: 0.8rem; color: #5f6368; margin-top: 5px; }
    
    .text-red { color: #f25555; font-size: 2.2rem; font-weight: 700; line-height: 1; }
    .text-yellow { color: #f9ab00; font-size: 2.2rem; font-weight: 700; line-height: 1; }
    .text-white-val { color: #e8eaed; font-size: 1.8rem; font-weight: 700; line-height: 1; }
    
    .chart-container {
      background-color: #1a1b21;
      border: 1px solid #2a2b30;
      border-radius: 12px;
      padding: 15px;
      margin-top: 20px;
    }
    
    .loading-text { text-align: center; color: #f9ab00; font-weight: 600; margin: 20px 0; }
  </style>
</head>
<body>

<div class="container-app">
  
  <div class="header-box mt-3">
    <div class="d-flex align-items-center mb-2">
      <h5 class="mb-0 fw-bold text-warning">รายงาน Yamada</h5>
      <span class="status-badge">Real-time</span>
    </div>
  </div>

  <!-- กล่องระบบค้นหา -->
  <div class="search-box">
    <div class="row g-2 align-items-center">
      <div class="col-4">
        <select id="filterType" class="form-select form-select-dark text-sm" onchange="toggleInput()">
          <option value="daily">รายวัน</option>
          <option value="weekly">รายสัปดาห์</option>
          <option value="monthly">รายเดือน</option>
          <option value="all">ดูทั้งหมด</option>
        </select>
      </div>
      <div class="col-5">
        <input type="date" id="inputDaily" class="form-control form-control-dark">
        <input type="week" id="inputWeekly" class="form-control form-control-dark" style="display:none;">
        <input type="month" id="inputMonthly" class="form-control form-control-dark" style="display:none;">
        <input type="text" id="inputAll" class="form-control form-control-dark text-center" value="ทุกช่วงเวลา" disabled style="display:none;">
      </div>
      <div class="col-3">
        <button class="btn btn-warning w-100 fw-bold" onclick="executeSearch()">ค้นหา</button>
      </div>
    </div>
  </div>

  <div id="loading" class="loading-text">กำลังโหลดข้อมูล... ⏳</div>

  <div id="dashboard-content" style="display: none;">
    <div class="row g-3">
      <div class="col-6">
        <div class="card-dark">
          <div class="card-title-sm" id="title-car-search">ยอดรถ (รายวัน)</div>
          <div id="search-cars" class="text-red">0</div>
          <div class="unit-text">คัน</div>
        </div>
      </div>
      
      <div class="col-6">
        <div class="card-dark">
          <div class="card-title-sm" id="title-people-search">ยอดคน (รายวัน)</div>
          <div id="search-people" class="text-white-val">0</div>
          <div class="unit-text">คน</div>
        </div>
      </div>

      <div class="col-6">
        <div class="card-dark">
          <div class="card-title-sm">ยอดรถรวมทั้งระบบ (All Time)</div>
          <div id="total-cars-system" class="text-yellow">0</div>
          <div class="unit-text">คัน</div>
        </div>
      </div>

      <div class="col-6">
        <div class="card-dark">
          <div class="card-title-sm">สัดส่วนที่ค้นหา (คน/รถ)</div>
          <div id="ratio-val" class="text-white-val">0.0</div>
          <div class="unit-text">เฉลี่ยคนต่อรถ 1 คัน</div>
        </div>
      </div>
    </div>

    <div class="chart-container">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="fw-bold" style="color: #e8eaed;">กราฟแนวโน้ม (Trend)</div>
        <div class="small" style="color: #8ab4f8;" id="chart-subtitle">ปริมาณรถรายช่วงเวลา</div>
      </div>
      <canvas id="trendChart" height="200"></canvas>
    </div>
  </div>

</div>

<script>
  const scriptURL = "https://script.google.com/macros/s/AKfycbzyW5hkrhy46WWPQwTi9xt20zd8QGxOQe9pHWrGLNkgSnbao5pcwld03k5J49SU3kaj/exec";
  let myChart = null;

  async function callAPI(action, data={}) {
    const response = await fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify({ action, data })
    });
    return await response.json();
  }

  // จัดการซ่อน/โชว์ ช่องกรอกข้อมูล
  function toggleInput() {
    const type = document.getElementById('filterType').value;
    document.getElementById('inputDaily').style.display = type === 'daily' ? 'block' : 'none';
    document.getElementById('inputWeekly').style.display = type === 'weekly' ? 'block' : 'none';
    document.getElementById('inputMonthly').style.display = type === 'monthly' ? 'block' : 'none';
    document.getElementById('inputAll').style.display = type === 'all' ? 'block' : 'none';
  }

  // คำนวณวันที่จากรูปแบบ Week (เช่น 2026-W20) เป็น จันทร์-อาทิตย์
  function getDatesFromWeek(weekStr) {
    const [year, week] = weekStr.split('-W');
    const simple = new Date(year, 0, 1 + (week - 1) * 7);
    const dow = simple.getDay();
    const isoStart = simple;
    if (dow <= 4) isoStart.setDate(simple.getDate() - simple.getDay() + 1);
    else isoStart.setDate(simple.getDate() + 8 - simple.getDay());
    const end = new Date(isoStart);
    end.setDate(isoStart.getDate() + 6);
    return { start: isoStart, end: end };
  }

  async function executeSearch() {
    const type = document.getElementById('filterType').value;
    let startDate, endDate, labelTitle;

    if (type === 'daily') {
      const val = document.getElementById('inputDaily').value;
      if(!val) return alert("กรุณาเลือกวันที่");
      startDate = val;
      endDate = val;
      labelTitle = "รายวัน";
    } else if (type === 'weekly') {
      const val = document.getElementById('inputWeekly').value;
      if(!val) return alert("กรุณาเลือกสัปดาห์");
      const dates = getDatesFromWeek(val);
      startDate = dates.start.toISOString().split('T')[0];
      endDate = dates.end.toISOString().split('T')[0];
      labelTitle = "รายสัปดาห์";
    } else if (type === 'monthly') {
      const val = document.getElementById('inputMonthly').value;
      if(!val) return alert("กรุณาเลือกเดือน");
      const [year, month] = val.split('-');
      startDate = `${year}-${month}-01`;
      const lastDay = new Date(year, month, 0).getDate();
      endDate = `${year}-${month}-${lastDay}`;
      labelTitle = "รายเดือน";
    } else if (type === 'all') {
      labelTitle = "ทั้งหมด";
    }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('dashboard-content').style.display = 'none';

    try {
      const result = await callAPI("searchData", { type, startDate, endDate });
      
      // อัปเดต Title การ์ดตามเงื่อนไขที่หา
      document.getElementById('title-car-search').innerText = `ยอดรถ (${labelTitle})`;
      document.getElementById('title-people-search').innerText = `ยอดคน (${labelTitle})`;
      document.getElementById('chart-subtitle').innerText = `ข้อมูลแบบ ${labelTitle}`;

      // อัปเดตตัวเลข
      document.getElementById('search-cars').innerText = result.searchCars.toLocaleString();
      document.getElementById('search-people').innerText = result.searchPeople.toLocaleString();
      document.getElementById('total-cars-system').innerText = result.totalSystemCars.toLocaleString();
      
      let ratio = result.searchCars > 0 ? (result.searchPeople / result.searchCars).toFixed(1) : "0.0";
      document.getElementById('ratio-val').innerText = ratio;

      renderChart(result.chartData);

      document.getElementById('loading').style.display = 'none';
      document.getElementById('dashboard-content').style.display = 'block';

    } catch (error) {
      console.error(error);
      document.getElementById('loading').innerText = "❌ เกิดข้อผิดพลาดในการโหลดข้อมูล";
      document.getElementById('loading').style.color = "#f25555";
    }
  }

  function renderChart(chartData) {
    const ctx = document.getElementById('trendChart').getContext('2d');
    if (myChart) myChart.destroy(); // เคลียร์กราฟเก่าทิ้งก่อนวาดใหม่

    const labels = Object.keys(chartData);
    const dataCars = labels.map(key => chartData[key].cars);

    myChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'รถ (คัน)',
          data: dataCars,
          borderColor: '#f9ab00',
          backgroundColor: 'rgba(249, 171, 0, 0.1)',
          borderWidth: 2,
          fill: true,
          tension: 0.3,
          pointBackgroundColor: '#1a1b21',
          pointBorderColor: '#f9ab00',
          pointBorderWidth: 2,
          pointRadius: 4
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: { mode: 'index', intersect: false }
        },
        scales: {
          y: { 
            beginAtZero: true, 
            grid: { color: '#2a2b30', drawBorder: false },
            ticks: { color: '#5f6368' }
          },
          x: { 
            grid: { display: false },
            ticks: { color: '#5f6368' }
          }
        },
        interaction: { mode: 'nearest', axis: 'x', intersect: false }
      }
    });
  }

  // เซ็ตค่าเริ่มต้นเป็นวันที่ปัจจุบัน แล้วกดค้นหาออโต้ตอนเปิดแอป
  window.onload = () => {
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    document.getElementById('inputDaily').value = `${yyyy}-${mm}-${dd}`;
    executeSearch();
  };
</script>
</body>
</html>
