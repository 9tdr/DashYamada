<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DashYamada</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* ตั้งค่าธีม Dark Mode */
    body { 
      background-color: #121317; 
      color: #9aa0a6; 
      font-family: 'Noto Sans Thai', sans-serif; 
      user-select: none;
      padding-bottom: 30px;
    }
    
    .container-app { max-width: 600px; margin: auto; padding: 15px; }
    
    /* กล่อง Header */
    .header-box {
      background-color: #1a1b21;
      border: 1px solid #3a3b40;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .status-badge {
      background-color: #3c4043;
      color: #e8eaed;
      font-size: 0.75rem;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 600;
      margin-left: 8px;
    }
    
    /* กล่องข้อมูล (Cards) */
    .card-dark {
      background-color: #1a1b21;
      border: 1px solid #2a2b30;
      border-radius: 12px;
      padding: 15px;
      height: 100%;
    }
    .card-title-sm { font-size: 0.85rem; color: #9aa0a6; margin-bottom: 8px; }
    .unit-text { font-size: 0.8rem; color: #5f6368; margin-top: 5px; }
    
    /* สีตัวเลข */
    .text-red { color: #f25555; font-size: 2.2rem; font-weight: 700; line-height: 1; }
    .text-yellow { color: #f9ab00; font-size: 2.2rem; font-weight: 700; line-height: 1; }
    .text-white-val { color: #e8eaed; font-size: 1.8rem; font-weight: 700; line-height: 1; }
    
    /* ส่วนของกราฟ */
    .chart-container {
      background-color: #1a1b21;
      border: 1px solid #2a2b30;
      border-radius: 12px;
      padding: 15px;
      margin-top: 20px;
    }
    
    .loading-text { text-align: center; color: #f9ab00; font-weight: 600; margin: 20px 0; }
  </style>
</head>
<body>

<div class="container-app">
  
  <div class="header-box mt-3">
    <div class="d-flex align-items-center mb-2">
      <h5 class="mb-0 fw-bold text-warning">รายงาน Yamada</h5>
      <span class="status-badge">Real-time</span>
    </div>
    <div class="small">
      <div style="color: #f9ab00;">! ข้อมูลดึงตรงจากระบบฐานข้อมูล</div>
      <div style="color: #f9ab00;">! อัปเดตยอดอัตโนมัติ</div>
    </div>
  </div>

  <div id="loading" class="loading-text">กำลังโหลดข้อมูล... ⏳</div>

  <div id="dashboard-content" style="display: none;">
    <div class="row g-3">
      <div class="col-6">
        <div class="card-dark">
          <div class="card-title-sm">ยอดรถรายวันล่าสุด</div>
          <div id="today-cars" class="text-red">0</div>
          <div class="unit-text">คัน</div>
        </div>
      </div>
      
      <div class="col-6">
        <div class="card-dark">
          <div class="card-title-sm">ยอดรถรวมสะสมทั้งหมด</div>
          <div id="total-cars" class="text-yellow">0</div>
          <div class="unit-text">คัน</div>
        </div>
      </div>

      <div class="col-6">
        <div class="card-dark">
          <div class="card-title-sm">ยอดคนรายวันล่าสุด</div>
          <div id="today-people" class="text-white-val">0</div>
          <div class="unit-text">คน</div>
        </div>
      </div>

      <div class="col-6">
        <div class="card-dark">
          <div class="card-title-sm">สัดส่วน (คน/รถ) สะสม</div>
          <div id="ratio-val" class="text-white-val">0.0</div>
          <div class="unit-text">เฉลี่ยคนต่อรถ 1 คัน</div>
        </div>
      </div>
    </div>

    <div class="chart-container">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="fw-bold" style="color: #e8eaed;">กราฟแนวโน้ม (Trend)</div>
        <div class="small" style="color: #8ab4f8;">ปริมาณรถรายเดือน</div>
      </div>
      <canvas id="trendChart" height="200"></canvas>
    </div>
  </div>

</div>

<script>
  // 🔗 วางลิงก์ Google Apps Script ตัวเดิมลงไปในช่องนี้ได้เลยครับ (ตัวเดียวกับที่ใช้ในแอปหน้าบันทึก)
  const scriptURL = "https://script.google.com/macros/s/AKfycbzyW5hkrhy46WWPQwTi9xt20zd8QGxOQe9pHWrGLNkgSnbao5pcwld03k5J49SU3kaj/exec";

  async function callAPI(action, data={}) {
    const response = await fetch(scriptURL, {
      method: "POST",https://script.google.com/macros/s/AKfycbzyW5hkrhy46WWPQwTi9xt20zd8QGxOQe9pHWrGLNkgSnbao5pcwld03k5J49SU3kaj/exec
      body: JSON.stringify({ action, data })
    });
    return await response.json();
  }

  async function loadDashboard() {
    try {
      // ดึงข้อมูล 2 ส่วนพร้อมกันเพื่อความรวดเร็ว
      const [todayData, analyticsData] = await Promise.all([
        callAPI("getSummary"),
        callAPI("getAnalytics")
      ]);

      // คำนวณยอดของวันนี้
      let todayCars = 0;
      let todayPeople = 0;
      todayData.forEach(row => {
        todayCars += row.cars;
        todayPeople += row.people;
      });

      // อัปเดตตัวเลขขึ้นหน้าจอ
      document.getElementById('today-cars').innerText = todayCars.toLocaleString();
      document.getElementById('total-cars').innerText = analyticsData.totalCars.toLocaleString();
      document.getElementById('today-people').innerText = todayPeople.toLocaleString();
      
      // คำนวณสัดส่วน
      let ratio = analyticsData.totalCars > 0 ? (analyticsData.totalPeople / analyticsData.totalCars).toFixed(1) : "0.0";
      document.getElementById('ratio-val').innerText = ratio;

      // สร้างกราฟ
      renderChart(analyticsData.monthlyData);

      // ปิดข้อความโหลด โชว์แดชบอร์ด
      document.getElementById('loading').style.display = 'none';
      document.getElementById('dashboard-content').style.display = 'block';

    } catch (error) {
      console.error(error);
      document.getElementById('loading').innerText = "❌ เกิดข้อผิดพลาดในการโหลดข้อมูล";
      document.getElementById('loading').style.color = "#f25555";
    }
  }

  function renderChart(monthlyData) {
    const ctx = document.getElementById('trendChart').getContext('2d');
    
    // แปลงข้อมูล Object เป็น Array สำหรับกราฟ
    const labels = Object.keys(monthlyData); // ชื่อเดือน เช่น 5/2569
    const dataCars = labels.map(key => monthlyData[key].cars);

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'รถ (คัน)',
          data: dataCars,
          borderColor: '#f9ab00',
          backgroundColor: 'rgba(249, 171, 0, 0.1)',
          borderWidth: 2,
          fill: true,
          tension: 0.3, // ทำให้เส้นโค้งสมูทขึ้น
          pointBackgroundColor: '#1a1b21',
          pointBorderColor: '#f9ab00',
          pointBorderWidth: 2,
          pointRadius: 4
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: { mode: 'index', intersect: false }
        },
        scales: {
          y: { 
            beginAtZero: true, 
            grid: { color: '#2a2b30', drawBorder: false },
            ticks: { color: '#5f6368' }
          },
          x: { 
            grid: { display: false },
            ticks: { color: '#5f6368' }
          }
        },
        interaction: { mode: 'nearest', axis: 'x', intersect: false }
      }
    });
  }

  // สั่งโหลดข้อมูลทันทีที่เปิดหน้าเว็บ
  loadDashboard();
</script>
</body>
</html>
